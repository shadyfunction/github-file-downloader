jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download file
        run: |
          curl -L --fail --retry 3 -o downloaded_file "${{ github.event.inputs.file_url }}"
          ls -lh downloaded_file

      - name: Get original filename (optional)
        run: |
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d '?' -f1)
          [ -z "$ORIGINAL_NAME" ] && ORIGINAL_NAME="downloaded_file"
          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV

      - name: Split into encrypted 7z volumes
        run: |
          mv downloaded_file "$ORIGINAL_NAME"   # rename to original
          7z a -p"${{ github.event.inputs.zip_password }}" -v45m archive.7z "$ORIGINAL_NAME"

      - name: Commit & push chunks in batches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          chunks=(archive.7z.*)
          total=${#chunks[@]}
          batch_size=10
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + batch_size - 1))
            [ $end -ge $total ] && end=$((total - 1))
            
            echo "Pushing chunks $start to $end ..."
            for i in $(seq $start $end); do
              git add "${chunks[$i]}"
            done
            
            git commit -m "Add chunks $((start+1))-$((end+1)) of $total"
            for attempt in {1..5}; do
              if git push; then
                echo "Push successful"
                break
              else
                echo "Push failed (attempt $attempt), retrying in 10 seconds..."
                sleep 10
              fi
            done
            
            start=$((end + 1))
            sleep 5
          done
